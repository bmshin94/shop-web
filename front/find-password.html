<!doctype html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>비밀번호 찾기 - Active Women's Premium Store</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#ec3713",
                        "primary-light": "#ffefe5",
                        "background-light": "#ffffff",
                        "background-alt": "#f8f6f6",
                        "background-dark": "#221310",
                        "text-main": "#181211",
                        "text-muted": "#896861",
                    },
                    fontFamily: {
                        display: [
                            "Pretendard",
                            "-apple-system",
                            "BlinkMacSystemFont",
                            "system-ui",
                            "Roboto",
                            "Helvetica Neue",
                            "Segoe UI",
                            "Apple SD Gothic Neo",
                            "Noto Sans KR",
                            "Malgun Gothic",
                            "sans-serif",
                        ],
                    },
                    borderRadius: {
                        DEFAULT: "0.25rem",
                        lg: "0.5rem",
                        xl: "0.75rem",
                        full: "9999px",
                    },
                },
            },
        };
    </script>
    <style>
        .hidden {
            display: none;
        }
    </style>

    <!-- Prevent FOUT and Layout Shift for Material Symbols -->
    <style id="fout-guard">
        .material-symbols-outlined {
            color: transparent !important;
            display: inline-block;
            width: 1em;
            overflow: hidden;
            white-space: nowrap;
            vertical-align: bottom;
        }
    </style>
    <script>
        document.fonts.ready.then(() => {
            const foutGuard = document.getElementById('fout-guard');
            if (foutGuard) foutGuard.remove();
        });
    </script>
</head>

<body
    class="bg-background-alt text-text-main font-display antialiased selection:bg-primary selection:text-white flex min-h-screen flex-col items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div
        class="w-full max-w-md space-y-8 bg-white p-8 rounded-2xl shadow-sm border border-gray-100 relative overflow-hidden">
        <!-- Logo & Header -->
        <div class="text-center">
            <a href="index.html" class="inline-flex items-center gap-2 mb-6">
                <div class="flex size-10 items-center justify-center rounded-full bg-primary text-white">
                    <span class="material-symbols-outlined text-2xl">stat_1</span>
                </div>
                <h1 class="text-2xl font-extrabold tracking-tight text-text-main">
                    Active Women
                </h1>
            </a>
            <h2 class="text-3xl font-bold tracking-tight text-text-main">비밀번호 찾기</h2>
            <p class="mt-2 text-sm text-text-muted" id="stepDescription">
                가입 시 등록한 이메일로 인증번호를 받아 비밀번호를 재설정할 수 있습니다.
            </p>
        </div>

        <!-- Step 1: Email Verification Form -->
        <form id="step1Form" class="mt-8 space-y-6" action="#" method="POST">
            <div class="space-y-4">
                <div>
                    <label for="email" class="block text-sm font-bold text-text-main mb-2">가입 이메일</label>
                    <div class="flex gap-2">
                        <input id="email" name="email" type="email" required
                            class="flex-1 block w-full appearance-none rounded-xl border border-gray-200 px-4 py-3 text-text-main placeholder-text-muted focus:z-10 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary text-sm transition-colors"
                            placeholder="이메일을 입력해주세요" />
                        <button type="button" id="btnSendAuthCode"
                            class="flex-shrink-0 bg-gray-100 hover:bg-gray-200 text-text-main px-4 py-3 rounded-xl text-sm font-bold transition-colors border border-gray-200 disabled:opacity-50 disabled:cursor-not-allowed">
                            인증번호 발송
                        </button>
                    </div>
                    <p id="emailErrorMsg" class="text-red-500 text-xs mt-1 hidden">올바른 이메일 형식을 입력해주세요.</p>
                </div>

                <div id="authCodeContainer" class="hidden transition-all duration-300">
                    <label for="authCode" class="block text-sm font-bold text-text-main mb-2">인증번호</label>
                    <div class="relative">
                        <input id="authCode" name="authCode" type="text"
                            class="block w-full appearance-none rounded-xl border border-gray-200 px-4 py-3 text-text-main placeholder-text-muted focus:z-10 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary text-sm transition-colors"
                            placeholder="6자리 숫자 입력" maxlength="6" />
                        <span id="authTimer"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-primary font-bold text-sm">03:00</span>
                    </div>
                    <p id="authCodeErrorMsg" class="text-red-500 text-xs mt-1 hidden">인증번호가 일치하지 않습니다.</p>
                </div>
            </div>

            <div>
                <button type="submit" id="btnVerifyCode" disabled
                    class="group relative flex w-full justify-center rounded-xl bg-primary px-4 py-3.5 text-sm font-bold text-white hover:bg-red-600 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition-all transform hover:-translate-y-0.5 shadow-md disabled:bg-gray-300 disabled:text-gray-500 disabled:transform-none disabled:shadow-none disabled:cursor-not-allowed">
                    인증 확인
                </button>
            </div>
        </form>

        <!-- Step 2: Reset Password Form (Hidden initially) -->
        <form id="step2Form" class="mt-8 space-y-6 hidden" action="#" method="POST">
            <div class="space-y-4">
                <div>
                    <label for="newPassword" class="block text-sm font-bold text-text-main mb-2">새 비밀번호</label>
                    <input id="newPassword" name="newPassword" type="password" required
                        class="relative block w-full appearance-none rounded-xl border border-gray-200 px-4 py-3 text-text-main placeholder-text-muted focus:z-10 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary text-sm transition-colors"
                        placeholder="영문, 숫자, 특수문자 조합 8자 이상" />
                </div>
                <div>
                    <label for="confirmPassword" class="block text-sm font-bold text-text-main mb-2">새 비밀번호 확인</label>
                    <input id="confirmPassword" name="confirmPassword" type="password" required
                        class="relative block w-full appearance-none rounded-xl border border-gray-200 px-4 py-3 text-text-main placeholder-text-muted focus:z-10 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary text-sm transition-colors"
                        placeholder="비밀번호를 한번 더 입력해주세요" />
                    <p id="passwordMatchMsg" class="text-red-500 text-xs mt-1 hidden">비밀번호가 일치하지 않습니다.</p>
                </div>
            </div>

            <div>
                <button type="submit" id="btnResetPassword"
                    class="group relative flex w-full justify-center rounded-xl bg-primary px-4 py-3.5 text-sm font-bold text-white hover:bg-red-600 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition-all transform hover:-translate-y-0.5 shadow-md">
                    <span id="btnResetPasswordText">비밀번호 변경하기</span>
                </button>
            </div>
        </form>

        <!-- Footer Linking -->
        <div class="pt-6 text-center border-t border-gray-100 mt-6">
            <a href="login.html"
                class="text-sm font-bold text-text-muted hover:text-primary transition-colors flex items-center justify-center gap-1">
                <span class="material-symbols-outlined text-[16px]">arrow_back</span>
                로그인으로 돌아가기
            </a>
        </div>
    </div>

    <!-- Toast Popup -->
    <div id="toast"
        class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] flex items-center justify-center gap-2 bg-text-main text-white px-6 py-3 rounded-full text-sm font-bold shadow-2xl transition-all duration-300 opacity-0 translate-y-8 pointer-events-none">
        <span class="material-symbols-outlined text-lg text-green-400" id="toastIcon">check_circle</span>
        <span id="toastMsg">처리되었습니다.</span>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- 토스트 알림 기능 ---
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            const toastIcon = document.getElementById('toastIcon');
            let toastTimeout;

            function showToast(message, iconName = 'check_circle', iconColorClass = 'text-green-400', isError = false) {
                toastMsg.textContent = message;
                toastIcon.textContent = iconName;
                toastIcon.className = `material-symbols-outlined text-lg ${iconColorClass}`;

                if (isError) {
                    toast.classList.replace('bg-text-main', 'bg-red-600');
                } else {
                    toast.classList.replace('bg-red-600', 'bg-text-main');
                }

                toast.classList.remove('opacity-0', 'translate-y-8');

                clearTimeout(toastTimeout);
                toastTimeout = setTimeout(() => {
                    toast.classList.add('opacity-0', 'translate-y-8');
                }, 3000);
            }

            // --- 1단계: 인증번호 발송 및 확인 인터랙션 ---
            const step1Form = document.getElementById('step1Form');
            const emailInput = document.getElementById('email');
            const btnSendAuthCode = document.getElementById('btnSendAuthCode');
            const authCodeContainer = document.getElementById('authCodeContainer');
            const authCodeInput = document.getElementById('authCode');
            const btnVerifyCode = document.getElementById('btnVerifyCode');
            const authTimerDisplay = document.getElementById('authTimer');
            const emailErrorMsg = document.getElementById('emailErrorMsg');
            const stepDescription = document.getElementById('stepDescription');

            // 2단계 폼 요소를 위한 변수
            const step2Form = document.getElementById('step2Form');

            let timerInterval;

            // 이메일 정규식 검사 유틸리티
            function isValidEmail(email) {
                return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
            }

            // 인증번호 발송 로직
            btnSendAuthCode.addEventListener('click', () => {
                const emailValue = emailInput.value.trim();

                if (!isValidEmail(emailValue)) {
                    emailErrorMsg.classList.remove('hidden');
                    emailInput.classList.add('border-red-500', 'focus:border-red-500', 'focus:ring-red-500');
                    return;
                }

                // 에러 스타일 리셋
                emailErrorMsg.classList.add('hidden');
                emailInput.classList.remove('border-red-500', 'focus:border-red-500', 'focus:ring-red-500');

                // 발송 시뮬레이션
                btnSendAuthCode.textContent = "재발송";
                btnSendAuthCode.classList.add('text-primary'); // 재발송 디자인 강조 (optional)

                showToast('인증번호가 이메일로 발송되었습니다.', 'mark_email_read', 'text-white');

                // 인증번호 입력 컨테이너 활성화
                authCodeContainer.classList.remove('hidden');
                btnVerifyCode.disabled = false;
                authCodeInput.value = '';
                authCodeInput.focus();

                // 3분 타이머 시작
                clearInterval(timerInterval);
                let timeLeft = 180; // 3분 = 180초

                function updateTimer() {
                    const minutes = Math.floor(timeLeft / 60);
                    const seconds = timeLeft % 60;
                    authTimerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        showToast('인증 시간이 만료되었습니다. 다시 발송해주세요.', 'error', 'text-white', true);
                        btnVerifyCode.disabled = true;
                    }
                    timeLeft--;
                }

                updateTimer(); // 즉시 1초 랜더링
                timerInterval = setInterval(updateTimer, 1000);
            });

            // 인증 코드 확인 폼 제출 (1단계 완료)
            step1Form.addEventListener('submit', (e) => {
                e.preventDefault();

                const code = authCodeInput.value.trim();

                // 시뮬레이션: 아무 코드나 6자리 입력하면 성공 처리
                if (code.length >= 6) {
                    clearInterval(timerInterval);
                    showToast('인증이 완료되었습니다. 새 비밀번호를 입력해주세요.', 'verified_user', 'text-green-400');

                    // 1단계 폼 숨기고 2단계 폼 노출
                    step1Form.classList.add('hidden');
                    step2Form.classList.remove('hidden');
                    stepDescription.textContent = '안전한 사용을 위해 새로운 비밀번호를 등록해주세요.';
                } else {
                    showToast('인증번호 6자리를 올바르게 입력해주세요.', 'error', 'text-white', true);
                    authCodeInput.focus();
                }
            });

            // --- 2단계: 새 비밀번호 변경 인터랙션 ---
            const newPasswordInput = document.getElementById('newPassword');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const passwordMatchMsg = document.getElementById('passwordMatchMsg');
            const btnResetPasswordText = document.getElementById('btnResetPasswordText');

            step2Form.addEventListener('submit', (e) => {
                e.preventDefault();

                const newPass = newPasswordInput.value;
                const confirmPass = confirmPasswordInput.value;

                if (newPass !== confirmPass) {
                    passwordMatchMsg.classList.remove('hidden');
                    confirmPasswordInput.classList.add('border-red-500', 'focus:border-red-500', 'focus:ring-red-500');
                    return;
                }

                // 에러 리셋
                passwordMatchMsg.classList.add('hidden');
                confirmPasswordInput.classList.remove('border-red-500', 'focus:border-red-500', 'focus:ring-red-500');

                // 로딩 상태 시뮬레이션
                btnResetPasswordText.textContent = '변경 중...';

                setTimeout(() => {
                    showToast('비밀번호가 성공적으로 변경되었습니다. 로그인 페이지로 이동합니다.', 'check_circle', 'text-green-400');

                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                }, 800);
            });

            // 실시간 비밀번호 일치 확인 피드백
            confirmPasswordInput.addEventListener('input', () => {
                if (newPasswordInput.value && confirmPasswordInput.value !== newPasswordInput.value) {
                    passwordMatchMsg.classList.remove('hidden');
                } else {
                    passwordMatchMsg.classList.add('hidden');
                }
            });
        });
    </script>
</body>

</html>
