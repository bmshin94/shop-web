<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>회원가입 - Active Women's Premium Store</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#ec3713",
              "primary-light": "#ffefe5",
              "background-light": "#ffffff",
              "background-alt": "#f8f6f6",
              "background-dark": "#221310",
              "text-main": "#181211",
              "text-muted": "#896861",
            },
            fontFamily: {
              display: [
                "Pretendard",
                "-apple-system",
                "BlinkMacSystemFont",
                "system-ui",
                "Roboto",
                "Helvetica Neue",
                "Segoe UI",
                "Apple SD Gothic Neo",
                "Noto Sans KR",
                "Malgun Gothic",
                "sans-serif",
              ],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      .hidden {
        display: none;
      }
    </style>
  
    <!-- Prevent FOUT and Layout Shift for Material Symbols -->
    <style id="fout-guard">
      .material-symbols-outlined { 
        color: transparent !important; 
        display: inline-block;
        width: 1em;
        overflow: hidden;
        white-space: nowrap;
        vertical-align: bottom;
      }
    </style>
    <script>
      document.fonts.ready.then(() => {
        const foutGuard = document.getElementById('fout-guard');
        if (foutGuard) foutGuard.remove();
      });
    </script>
</head>

  <body
    class="bg-background-alt text-text-main font-display antialiased selection:bg-primary selection:text-white flex min-h-screen flex-col items-center justify-center py-12 px-4 sm:px-6 lg:px-8"
  >
    <div
      class="w-full max-w-lg space-y-8 bg-white p-8 sm:p-10 rounded-2xl shadow-sm border border-gray-100"
    >
      <!-- Logo & Header -->
      <div class="text-center">
        <a href="index.html" class="inline-flex items-center gap-2 mb-6">
          <div
            class="flex size-10 items-center justify-center rounded-full bg-primary text-white"
          >
            <span class="material-symbols-outlined text-2xl">stat_1</span>
          </div>
          <h1 class="text-2xl font-extrabold tracking-tight text-text-main">
            Active Women
          </h1>
        </a>
        <h2 class="text-3xl font-bold tracking-tight text-text-main">
          회원가입
        </h2>
        <p class="mt-2 text-sm text-text-muted">
          가입하고 신규 회원 10% 혜택을 받으세요.
        </p>
      </div>

      <!-- Register Form -->
      <form class="mt-8 space-y-6" action="#" method="POST">
        <div class="space-y-5">
          <!-- Name -->
          <div>
            <label
              for="name"
              class="block text-sm font-bold text-text-main mb-2"
              >이름 <span class="text-primary">*</span></label
            >
            <input
              id="name"
              name="name"
              type="text"
              required
              class="relative block w-full appearance-none rounded-xl border border-gray-200 px-4 py-3 text-text-main placeholder-text-muted focus:z-10 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary text-sm transition-colors"
              placeholder="이름을 입력해주세요"
            />
          </div>

          <!-- Email -->
          <div>
            <label
              for="email"
              class="block text-sm font-bold text-text-main mb-2"
              >이메일 주소 <span class="text-primary">*</span></label
            >
            <div class="flex gap-2">
              <input
                id="email"
                name="email"
                type="email"
                autocomplete="email"
                required
                class="relative block w-full appearance-none rounded-xl border border-gray-200 px-4 py-3 text-text-main placeholder-text-muted focus:z-10 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary text-sm transition-colors flex-1"
                placeholder="example@email.com"
              />
              <button
                type="button"
                class="px-4 py-3 bg-gray-100 hover:bg-gray-200 font-bold text-xs text-text-main rounded-xl transition-colors border border-gray-200 whitespace-nowrap"
              >
                중복 확인
              </button>
            </div>
          </div>

          <!-- Password -->
          <div>
            <label
              for="password"
              class="block text-sm font-bold text-text-main mb-2"
              >비밀번호 <span class="text-primary">*</span></label
            >
            <input
              id="password"
              name="password"
              type="password"
              required
              class="relative block w-full appearance-none rounded-xl border border-gray-200 px-4 py-3 text-text-main placeholder-text-muted focus:z-10 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary text-sm transition-colors"
              placeholder="영문, 숫자, 특수문자 조합 8자 이상"
            />
          </div>

          <!-- Password Confirm -->
          <div>
            <label
              for="password_confirm"
              class="block text-sm font-bold text-text-main mb-2"
              >비밀번호 확인 <span class="text-primary">*</span></label
            >
            <input
              id="password_confirm"
              name="password_confirm"
              type="password"
              required
              class="relative block w-full appearance-none rounded-xl border border-gray-200 px-4 py-3 text-text-main placeholder-text-muted focus:z-10 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary text-sm transition-colors"
              placeholder="비밀번호를 다시 입력해주세요"
            />
          </div>

          <!-- Phone -->
          <div>
            <label
              for="phone"
              class="block text-sm font-bold text-text-main mb-2"
              >휴대폰 번호 <span class="text-primary">*</span></label
            >
            <div class="flex gap-2">
              <input
                id="phone"
                name="phone"
                type="tel"
                required
                class="relative block w-full appearance-none rounded-xl border border-gray-200 px-4 py-3 text-text-main placeholder-text-muted focus:z-10 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary text-sm transition-colors flex-1"
                placeholder="010-0000-0000"
              />
              <button
                type="button"
                class="px-4 py-3 bg-gray-100 hover:bg-gray-200 font-bold text-xs text-text-main rounded-xl transition-colors border border-gray-200 whitespace-nowrap"
              >
                인증번호 받기
              </button>
            </div>
          </div>
        </div>

        <!-- Terms Agreement -->
        <div class="pt-4 pb-2 border-t border-gray-100">
          <h3 class="font-bold text-sm text-text-main mb-4">이용약관 동의</h3>

          <div class="space-y-3">
            <label
              class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl border border-gray-200 cursor-pointer"
            >
              <input
                type="checkbox"
                class="rounded border-gray-300 text-primary w-5 h-5 focus:ring-primary focus:ring-offset-0"
              />
              <span class="font-bold text-text-main text-sm"
                >전체 동의합니다.</span
              >
            </label>

            <div class="pl-2 space-y-3 mt-3">
              <div class="flex justify-between items-center group">
                <label class="flex items-center gap-2 cursor-pointer">
                  <input
                    type="checkbox"
                    required
                    class="rounded border-gray-300 text-primary w-4 h-4 focus:ring-primary relative top-[-1px]"
                  />
                  <span
                    class="text-sm text-text-muted group-hover:text-text-main transition-colors"
                    >[필수] 서비스 이용약관 동의</span
                  >
                </label>
                <a
                  href="#"
                  class="text-xs font-bold text-text-muted hover:underline"
                  >보기</a
                >
              </div>
              <div class="flex justify-between items-center group">
                <label class="flex items-center gap-2 cursor-pointer">
                  <input
                    type="checkbox"
                    required
                    class="rounded border-gray-300 text-primary w-4 h-4 focus:ring-primary relative top-[-1px]"
                  />
                  <span
                    class="text-sm text-text-muted group-hover:text-text-main transition-colors"
                    >[필수] 개인정보 수집 및 이용 동의</span
                  >
                </label>
                <a
                  href="#"
                  class="text-xs font-bold text-text-muted hover:underline"
                  >보기</a
                >
              </div>
              <div class="flex justify-between items-center group">
                <label class="flex items-center gap-2 cursor-pointer">
                  <input
                    type="checkbox"
                    class="rounded border-gray-300 text-primary w-4 h-4 focus:ring-primary relative top-[-1px]"
                  />
                  <span
                    class="text-sm text-text-muted group-hover:text-text-main transition-colors"
                    >[선택] 마케팅 정보 수신 동의</span
                  >
                </label>
                <a
                  href="#"
                  class="text-xs font-bold text-text-muted hover:underline"
                  >보기</a
                >
              </div>
            </div>
          </div>
        </div>

        <!-- Submit Button -->
        <div>
          <button
            type="submit"
            class="group relative flex w-full justify-center rounded-xl bg-primary px-4 py-4 text-sm font-bold text-white hover:bg-red-600 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition-all transform hover:-translate-y-0.5 shadow-md"
          >
            가입하기
          </button>
        </div>
      </form>

      <!-- Footer Linking -->
      <div class="pt-6 text-center mt-6">
        <p class="text-sm text-text-muted">
          이미 계정이 있으신가요?
          <a
            href="login.html"
            class="font-bold text-primary hover:underline ml-1"
            >로그인하기</a
          >
        </p>
      </div>
    </div>
  </body>
</html>
