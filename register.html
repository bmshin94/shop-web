<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>회원가입 - Active Women's Premium Store</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block"
    rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#ec3713",
            "primary-light": "#ffefe5",
            "background-light": "#ffffff",
            "background-alt": "#f8f6f6",
            "background-dark": "#221310",
            "text-main": "#181211",
            "text-muted": "#896861",
          },
          fontFamily: {
            display: [
              "Pretendard",
              "-apple-system",
              "BlinkMacSystemFont",
              "system-ui",
              "Roboto",
              "Helvetica Neue",
              "Segoe UI",
              "Apple SD Gothic Neo",
              "Noto Sans KR",
              "Malgun Gothic",
              "sans-serif",
            ],
          },
          borderRadius: {
            DEFAULT: "0.25rem",
            lg: "0.5rem",
            xl: "0.75rem",
            full: "9999px",
          },
        },
      },
    };
  </script>
  <style>
    .hidden {
      display: none;
    }
  </style>

  <!-- Prevent FOUT and Layout Shift for Material Symbols -->
  <style id="fout-guard">
    .material-symbols-outlined {
      color: transparent !important;
      display: inline-block;
      width: 1em;
      overflow: hidden;
      white-space: nowrap;
      vertical-align: bottom;
    }
  </style>
  <script>
    document.fonts.ready.then(() => {
      const foutGuard = document.getElementById('fout-guard');
      if (foutGuard) foutGuard.remove();
    });
  </script>
</head>

<body
  class="bg-background-alt text-text-main font-display antialiased selection:bg-primary selection:text-white flex min-h-screen flex-col items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
  <div class="w-full max-w-lg space-y-8 bg-white p-8 sm:p-10 rounded-2xl shadow-sm border border-gray-100">
    <!-- Logo & Header -->
    <div class="text-center">
      <a href="index.html" class="inline-flex items-center gap-2 mb-6">
        <div class="flex size-10 items-center justify-center rounded-full bg-primary text-white">
          <span class="material-symbols-outlined text-2xl">stat_1</span>
        </div>
        <h1 class="text-2xl font-extrabold tracking-tight text-text-main">
          Active Women
        </h1>
      </a>
      <h2 class="text-3xl font-bold tracking-tight text-text-main">
        회원가입
      </h2>
      <p class="mt-2 text-sm text-text-muted">
        가입하고 신규 회원 10% 혜택을 받으세요.
      </p>
    </div>

    <!-- Register Form -->
    <form class="mt-8 space-y-6" action="#" method="POST">
      <div class="space-y-5">
        <!-- Name -->
        <div>
          <label for="name" class="block text-sm font-bold text-text-main mb-2">이름 <span
              class="text-primary">*</span></label>
          <input id="name" name="name" type="text" required
            class="relative block w-full appearance-none rounded-xl border border-gray-200 px-4 py-3 text-text-main placeholder-text-muted focus:z-10 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary text-sm transition-colors"
            placeholder="이름을 입력해주세요" />
        </div>

        <!-- Email -->
        <div>
          <label for="email" class="block text-sm font-bold text-text-main mb-2">이메일 주소 <span
              class="text-primary">*</span></label>
          <div class="flex gap-2">
            <input id="email" name="email" type="email" autocomplete="email" required
              class="relative block w-full appearance-none rounded-xl border border-gray-200 px-4 py-3 text-text-main placeholder-text-muted focus:z-10 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary text-sm transition-colors flex-1"
              placeholder="example@email.com" />
            <button type="button" id="btnCheckEmail"
              class="px-4 py-3 bg-gray-100 hover:bg-gray-200 font-bold text-xs text-text-main rounded-xl transition-colors border border-gray-200 whitespace-nowrap">
              중복 확인
            </button>
          </div>
          <p id="emailErrorMsg" class="text-red-500 text-xs mt-1 hidden font-bold">올바른 이메일 형식을 입력해주세요.</p>
        </div>

        <!-- Password -->
        <div>
          <label for="password" class="block text-sm font-bold text-text-main mb-2">비밀번호 <span
              class="text-primary">*</span></label>
          <input id="password" name="password" type="password" required
            class="relative block w-full appearance-none rounded-xl border border-gray-200 px-4 py-3 text-text-main placeholder-text-muted focus:z-10 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary text-sm transition-colors"
            placeholder="영문, 숫자, 특수문자 조합 8자 이상" />
        </div>

        <!-- Password Confirm -->
        <div>
          <label for="password_confirm" class="block text-sm font-bold text-text-main mb-2">비밀번호 확인 <span
              class="text-primary">*</span></label>
          <input id="password_confirm" name="password_confirm" type="password" required
            class="relative block w-full appearance-none rounded-xl border border-gray-200 px-4 py-3 text-text-main placeholder-text-muted focus:z-10 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary text-sm transition-colors"
            placeholder="비밀번호를 다시 입력해주세요" />
          <p id="passwordMatchMsg" class="text-red-500 text-xs mt-1 hidden font-bold">비밀번호가 일치하지 않습니다.</p>
        </div>

        <!-- Phone -->
        <div>
          <label for="phone" class="block text-sm font-bold text-text-main mb-2">휴대폰 번호 <span
              class="text-primary">*</span></label>
          <div class="flex gap-2">
            <input id="phone" name="phone" type="tel" required
              class="relative block w-full appearance-none rounded-xl border border-gray-200 px-4 py-3 text-text-main placeholder-text-muted focus:z-10 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary text-sm transition-colors flex-1"
              placeholder="010-0000-0000" />
            <button type="button" id="btnSendPhoneAuth"
              class="px-4 py-3 bg-gray-100 hover:bg-gray-200 font-bold text-xs text-text-main rounded-xl transition-colors border border-gray-200 whitespace-nowrap">
              인증번호 받기
            </button>
          </div>

          <!-- Auth Code Input (Hidden initially) -->
          <div id="phoneAuthCodeContainer" class="relative mt-2 hidden">
            <input id="phoneAuthCode" type="text"
              class="block w-full appearance-none rounded-xl border border-gray-200 px-4 py-3 text-text-main placeholder-text-muted focus:z-10 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary text-sm transition-colors"
              placeholder="6자리 숫자 입력" maxlength="6" />
            <span id="phoneAuthTimer"
              class="absolute right-4 top-1/2 -translate-y-1/2 text-primary font-bold text-sm">03:00</span>
          </div>
        </div>
      </div>

      <!-- Terms Agreement -->
      <div class="pt-4 pb-2 border-t border-gray-100">
        <h3 class="font-bold text-sm text-text-main mb-4">이용약관 동의</h3>

        <div class="space-y-3">
          <label class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl border border-gray-200 cursor-pointer">
            <input type="checkbox" id="checkAllTerms"
              class="rounded border-gray-300 text-primary w-5 h-5 focus:ring-primary focus:ring-offset-0" />
            <span class="font-bold text-text-main text-sm">전체 동의합니다.</span>
          </label>

          <div class="pl-2 space-y-3 mt-3">
            <div class="flex justify-between items-center group">
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" value="required" required
                  class="term-checkbox rounded border-gray-300 text-primary w-4 h-4 focus:ring-primary relative top-[-1px]" />
                <span class="text-sm text-text-muted group-hover:text-text-main transition-colors">[필수] 서비스 이용약관
                  동의</span>
              </label>
              <a href="#" class="text-xs font-bold text-text-muted hover:underline">보기</a>
            </div>
            <div class="flex justify-between items-center group">
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" value="required" required
                  class="term-checkbox rounded border-gray-300 text-primary w-4 h-4 focus:ring-primary relative top-[-1px]" />
                <span class="text-sm text-text-muted group-hover:text-text-main transition-colors">[필수] 개인정보 수집 및 이용
                  동의</span>
              </label>
              <a href="#" class="text-xs font-bold text-text-muted hover:underline">보기</a>
            </div>
            <div class="flex justify-between items-center group">
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" value="optional"
                  class="term-checkbox rounded border-gray-300 text-primary w-4 h-4 focus:ring-primary relative top-[-1px]" />
                <span class="text-sm text-text-muted group-hover:text-text-main transition-colors">[선택] 마케팅 정보 수신
                  동의</span>
              </label>
              <a href="#" class="text-xs font-bold text-text-muted hover:underline">보기</a>
            </div>
          </div>
        </div>
      </div>

      <!-- Submit Button -->
      <div>
        <button type="submit" id="registerSubmitBtn"
          class="group relative flex w-full justify-center rounded-xl bg-primary px-4 py-4 text-sm font-bold text-white hover:bg-red-600 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition-all transform hover:-translate-y-0.5 shadow-md">
          <span id="registerBtnText">가입하기</span>
        </button>
      </div>
    </form>

    <!-- Footer Linking -->
    <div class="pt-6 text-center mt-6">
      <p class="text-sm text-text-muted">
        이미 계정이 있으신가요?
        <a href="login.html" class="font-bold text-primary hover:underline ml-1">로그인하기</a>
      </p>
    </div>
  </div>

  <!-- Toast Popup -->
  <div id="toast"
    class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] flex items-center justify-center gap-2 bg-text-main text-white px-6 py-3 rounded-full text-sm font-bold shadow-2xl transition-all duration-300 opacity-0 translate-y-8 pointer-events-none">
    <span class="material-symbols-outlined text-lg text-green-400" id="toastIcon">check_circle</span>
    <span id="toastMsg">처리되었습니다.</span>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // --- 토스트 알림 컴포넌트 ---
      const toast = document.getElementById('toast');
      const toastMsg = document.getElementById('toastMsg');
      const toastIcon = document.getElementById('toastIcon');
      let toastTimeout;

      function showToast(message, iconName = 'check_circle', iconColorClass = 'text-green-400', isError = false) {
        toastMsg.textContent = message;
        toastIcon.textContent = iconName;
        toastIcon.className = `material-symbols-outlined text-lg ${iconColorClass}`;

        if (isError) {
          toast.classList.replace('bg-text-main', 'bg-red-600');
        } else {
          toast.classList.replace('bg-red-600', 'bg-text-main');
        }

        toast.classList.remove('opacity-0', 'translate-y-8');

        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => {
          toast.classList.add('opacity-0', 'translate-y-8');
        }, 3000);
      }

      // --- 이메일 중복 확인 모의 동작 ---
      const emailInput = document.getElementById('email');
      const btnCheckEmail = document.getElementById('btnCheckEmail');
      const emailErrorMsg = document.getElementById('emailErrorMsg');

      function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      }

      btnCheckEmail.addEventListener('click', () => {
        const emailVal = emailInput.value.trim();
        if (!isValidEmail(emailVal)) {
          emailErrorMsg.classList.remove('hidden');
          emailInput.classList.add('border-red-500', 'focus:border-red-500', 'focus:ring-red-500');
        } else {
          emailErrorMsg.classList.add('hidden');
          emailInput.classList.remove('border-red-500', 'focus:border-red-500', 'focus:ring-red-500');
          showToast('사용 가능한 이메일입니다.', 'check_circle', 'text-green-400');
        }
      });

      // --- 비밀번호 일치 실시간 검증 ---
      const passwordInput = document.getElementById('password');
      const confirmPasswordInput = document.getElementById('password_confirm');
      const passwordMatchMsg = document.getElementById('passwordMatchMsg');

      confirmPasswordInput.addEventListener('input', () => {
        if (passwordInput.value && confirmPasswordInput.value !== passwordInput.value) {
          passwordMatchMsg.classList.remove('hidden');
        } else {
          passwordMatchMsg.classList.add('hidden');
        }
      });

      // --- 휴대폰 인증번호 발송 모의 동작 ---
      const phoneInput = document.getElementById('phone');
      const btnSendPhoneAuth = document.getElementById('btnSendPhoneAuth');
      const phoneAuthCodeContainer = document.getElementById('phoneAuthCodeContainer');
      const phoneAuthTimer = document.getElementById('phoneAuthTimer');
      let phoneTimerInterval;

      btnSendPhoneAuth.addEventListener('click', () => {
        if (phoneInput.value.length < 10) {
          showToast('올바른 휴대폰 번호를 입력해주세요.', 'error', 'text-white', true);
          return;
        }

        btnSendPhoneAuth.textContent = '재발송';
        btnSendPhoneAuth.classList.add('text-primary');
        showToast('인증번호 6자리를 발송했습니다.', 'sms', 'text-white');

        phoneAuthCodeContainer.classList.remove('hidden');

        clearInterval(phoneTimerInterval);
        let timeLeft = 180; // 3분

        function updateTimer() {
          const m = Math.floor(timeLeft / 60);
          const s = timeLeft % 60;
          phoneAuthTimer.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
          if (timeLeft <= 0) {
            clearInterval(phoneTimerInterval);
            showToast('인증 시간이 만료되었습니다.', 'error', 'text-white', true);
          }
          timeLeft--;
        }
        updateTimer();
        phoneTimerInterval = setInterval(updateTimer, 1000);
      });

      // --- 이용약관 전체 동의 연동 ---
      const checkAllTerms = document.getElementById('checkAllTerms');
      const termCheckboxes = document.querySelectorAll('.term-checkbox');

      checkAllTerms.addEventListener('change', (e) => {
        const isChecked = e.target.checked;
        termCheckboxes.forEach(cb => cb.checked = isChecked);
      });

      // 리스너: 하위 체크박스 변경 시 전체 동의 체크박스 상태 업데이트
      termCheckboxes.forEach(cb => {
        cb.addEventListener('change', () => {
          const allChecked = Array.from(termCheckboxes).every(t => t.checked);
          checkAllTerms.checked = allChecked;
        });
      });

      // --- 회원가입 폼 제출 인터랙션 ---
      const registerForm = document.querySelector('form');
      const registerBtnText = document.getElementById('registerBtnText');

      registerForm.addEventListener('submit', (e) => {
        e.preventDefault();

        // 최종 비밀번호 일치 확인
        if (passwordInput.value !== confirmPasswordInput.value) {
          confirmPasswordInput.classList.add('border-red-500', 'focus:border-red-500');
          passwordMatchMsg.classList.remove('hidden');
          window.scrollTo({ top: passwordMatchMsg.parentElement.offsetTop - 100, behavior: 'smooth' });
          return;
        }

        // (인증번호 검증 시뮬레이션 생략, 무조건 통과하는 것으로 간주)

        // 로딩 상태 추가 후 완료 처리 연출
        registerBtnText.textContent = '가입 처리 중...';

        setTimeout(() => {
          showToast('가입이 완료되었습니다! 프리미엄 혜택을 환영합니다.', 'celebration', 'text-yellow-400');

          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1800);
        }, 1000);
      });
    });
  </script>
</body>

</html>
